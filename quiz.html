<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    margin: auto;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #38bdf8;
    cursor: pointer;
}

.correct { background: green !important; }
.wrong { background: red !important; }

#nextBtn {
    display: none;
    background: #22c55e;
}
</style>
</head>
<body>

<div class="container">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="nextBtn" onclick="nextQuestion()">Next</button>
    <p id="score"></p>
</div>

<script>
const quiz = [
    {
        question: "What is HTML?",
        answers: ["Programming Language", "Markup Language", "Database", "Operating System"],
        correct: 1
    },
    {
        question: "Which is used for styling?",
        answers: ["HTML", "Python", "CSS", "SQL"],
        correct: 2
    },
    {
        question: "Which is a programming language?",
        answers: ["CSS", "HTML", "Python", "XML"],
        correct: 2
    }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    let q = quiz[currentQuestion];
    document.getElementById("question").innerText = q.question;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        let btn = document.createElement("button");
        btn.innerText = answer;
        btn.onclick = () => checkAnswer(btn, index);
        answersDiv.appendChild(btn);
    });

    document.getElementById("nextBtn").style.display = "none";
}

function checkAnswer(button, index) {
    let correct = quiz[currentQuestion].correct;

    let buttons = document.querySelectorAll("#answers button");

    buttons.forEach((btn, i) => {
        if (i === correct) {
            btn.classList.add("correct");
        } else if (i === index) {
            btn.classList.add("wrong");
        }
        btn.disabled = true;
    });

    if (index === correct) score++;

    document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        document.getElementById("question").innerText = "Quiz Finished!";
        document.getElementById("answers").innerHTML = "";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("score").innerText = "Your Score: " + score;
    }
}

loadQuestion();
</script>

</body>
</html>
