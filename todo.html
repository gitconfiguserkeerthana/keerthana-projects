<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin-top: 50px;
}

input {
    padding: 10px;
    width: 200px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    margin-left: 5px;
    border: none;
    border-radius: 5px;
    background: #38bdf8;
    cursor: pointer;
}

button:hover {
    background: #22c55e;
    color: white;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    margin: 10px;
    background: #1e293b;
    padding: 10px;
    border-radius: 5px;
}

.delete {
    background: red;
    margin-left: 10px;
}
</style>
</head>
<body>

<h1>My To-Do List</h1>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script>
function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") {
        alert("Please enter a task");
        return;
    }

    let li = document.createElement("li");
    li.textContent = task;

    // Delete button
    let btn = document.createElement("button");
    btn.textContent = "Delete";
    btn.className = "delete";
    btn.onclick = function() {
        li.remove();
    };

    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}
</script>

</body>
</html>
